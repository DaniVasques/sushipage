<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP Sushi</title>


  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital,wght@0,400..700;1,400..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <header>
    <div class="container">
      <div class="logo">
        <img src="img/logo.svg" alt="">
      </div>
      <nav class="menu">
        <a href="#">Início</a>
        <a href="#">O Restaurante</a>
        <a href="#">Cardápio</a>
        <a href="#">Localização</a>
      </nav>

      <div class="btn-menu">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>

      <a href="#" class="btn btn-delivery">Pedir Delivery</a>
    </div>
  </header>

  <section class="hero">

    <div class="container">

      <div class="content-hero">
        <h1>Sushi</h1>
        <h2>Experimente o verdadeiro sabor do Japão.</h2>
        <div class="divisor"></div>
        <p>Descubra uma seleção exclusiva de sushis, sashimis e pratos especiais preparados com ingredientes frescos e
          apresentação impecável.</p>

        <div class="ctas">
          <a href="#" class="btn btn-reserva">Fazer Reserva</a>
          <a href="#">Ver cardápio</a>
        </div>

      </div>

      <div class="image-hero">
        <div class="review">
          <div>
            <img src="img/star.svg" alt="">
            <span>4.9</span>
          </div>
          <span>Google Reviews</span>
        </div>

        <img src="img/imagem_hero.webp" alt="" width="626">
      </div>
    </div>

  </section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="js/style.js"></script>

</body>

</html>
